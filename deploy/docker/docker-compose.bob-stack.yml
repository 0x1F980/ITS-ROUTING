# Bob hidden-service reference stack (Fase 4 skeleton)
#
# pool-mirror + local nginx static site + sidecar placeholders for KM/routing.
# Production Bob runs on a secure endpoint — this is local dev / CI reference only.
#
# Build:  ./deploy/docker/docker_build_all.sh
# Up:     docker compose -f deploy/docker/docker-compose.bob-stack.yml up -d
# Smoke:  curl -sf 'http://127.0.0.1:8787/pool/cells?from=0' >/dev/null

services:
  pool-mirror:
    image: python:3.12-alpine
    working_dir: /app
    volumes:
      - ../pool-mirror:/app:ro
      - bob-mirror-store:/store
    environment:
      - ITS_PROD_GATE=${ITS_PROD_GATE:-0}
    command: ["python3", "pool_mirror_server.py", "--port", "8787", "--store-dir", "/store"]
    ports:
      - "8787:8787"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8787/pool/cells?from=0"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - bob-net

  bob-nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./bob-site:/usr/share/nginx/html:ro
      - ./nginx-bob.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:8080"
    networks:
      - bob-net

  its-routing:
    image: its-routing:local
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      pool-mirror:
        condition: service_healthy
    volumes:
      - ../../config.prod.toml:/etc/its/routing.toml:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Bob stack: its-routing sidecar — run ingress bridge on host or exec"
        echo "  See ITS_HIDDEN_SERVICE.md + scripts/pipe_its_socks_pool_e2e.sh"
        exec sleep infinity
    networks:
      - bob-net

  its-km:
    image: its-km-compose:local
    build:
      context: .
      dockerfile: Dockerfile.its-km-compose
    depends_on:
      pool-mirror:
        condition: service_healthy
    volumes:
      - bob-km-vault:/vault
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Bob stack: its-km sidecar — vault init + receive --continuous on host"
        exec sleep infinity
    networks:
      - bob-net

networks:
  bob-net:
    driver: bridge

volumes:
  bob-mirror-store:
  bob-km-vault:
