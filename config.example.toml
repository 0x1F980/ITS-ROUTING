# ==============================================================================
# MORPHIC ROUTING NETWORK CONFIGURATION TEMPLATE
# Modulus Z_{2^31-1} (Mersenne-31) - Information-Theoretic Secrecy (ITS)
# ==============================================================================

[node]
# Unique identifier of this node in the finite field Z_{2^31-1} (1..=2147483646)
id = 1

# Listening port for bare-metal UDP sockets
port = 8180

# Address to bind the listener to
bind_address = "0.0.0.0"

[crypto]
# Security thresholds for Shamir's Secret Sharing (SSS)
threshold_k = 3
total_shares_n = 5

# Local private trapdoor point (x, y) modulo 2147483647.
# Only known to this node's administrator.
trapdoor_x = 2
trapdoor_y = 11

# Public anchor point used for Ambient Entropy Harvesting (AEH)
stealth_anchor = 13
stealth_whitening_factor = 7

[traffic]
# Chaff and transmission rate configuration
# If true, the node will emit uniform random chaff packets when queues are empty
constant_rate_chaff_enabled = true

# The transmission frequency (in milliseconds)
tick_rate_ms = 100

# The static payload size (must match compile-time constant PAYLOAD_SIZE)
payload_size_elements = 16

[aeh]
# Ambient Entropy Harvesting sources
entropy_sources = [
    "https://api.nasa.gov/planetary/apod", # Public telemetry
    "https://blockchain.info/q/latesthash", # Block hash source
    "https://torrent-tracker.onion/scrape"  # Torrent tracker metadata
]

[pool]
# UES Monocell Pool (default transport mode v1.5)
transport_mode = "pool"
pool_file = ".its-pool"
# pool_url = "http://127.0.0.1:8787"
cell_size_L = 4096
epoch_interval_ms = 100
sss_k = 2
sss_n = 3
fountain_enabled = false
# multi_pool_urls = ["http://mirror1:8787", "http://mirror2:8787"]
# witness_pool_urls = []   # A2′ Charlie mirrors for k-of-n consensus
# consensus_k = 1
# valid_fwd_window = 64

[fingerprint_erasure]
# Required when --fingerprint-erasure without --fe-pad (v0.8 strict stack)
default_pad = "/path/to/offline.pad"
require_otp = true
require_chaff = true
require_on_file_send = true
