# Listening port for bare-metal UDP sockets
port = 8180

# Address to bind the listener to
bind_address = "0.0.0.0"

[crypto]
# Security thresholds for Shamir's Secret Sharing (SSS)
threshold_k = 3
total_shares_n = 5

# Local private trapdoor point (x, y) modulo 2147483647.
# Only known to this node's administrator.
trapdoor_x = 2
trapdoor_y = 11

# Public anchor point used for Ambient Entropy Harvesting (AEH)
